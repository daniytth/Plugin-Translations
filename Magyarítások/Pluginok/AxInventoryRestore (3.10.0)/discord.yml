# ------- WEBHOOKS -------

# REQUIRED FOR WEBHOOKS
url: ''

# this may be a bit spammy on big servers
backup-create:
  enabled: false
  color: '#00AAFF'
  title:
    text: Új Biztonsági Mentés Létrehozva
  fields:
    '1':
      inline: false
      name: Játékos
      value: '%player%'
    '2':
      inline: false
      name: Kategória
      value: '%category%'
    '3':
      inline: false
      name: Extra Infórmáció
      value: '%extrainfo%'

backup-restore:
  enabled: true
  color: '#00AAFF'
  title:
    text: Biztonsági Mentés Visszaállítás
  fields:
    '1':
      inline: true
      name: Visszaállította
      value: '%restorer%'
    '2':
      inline: true
      name: Játékos
      value: '%player%'
    '3':
      inline: true
      name: Biztonsági Mentés Dátuma
      value: '%date%'
    '4':
      inline: true
      name: Kategória
      value: '%category%'
    '5':
      inline: true
      name: Extra Infórmáció
      value: '%extrainfo%'
    '6':
      inline: true
      name: Biztonsági Mentés Helyszíne
      value: '%location%'

backup-export:
  enabled: true
  color: '#00AAFF'
  title:
    text: Biztonsági Mentés Expotálva Shulkerként
  fields:
    '1':
      inline: true
      name: Exportálta
      value: '%restorer%'
    '2':
      inline: true
      name: Játékos
      value: '%player%'
    '3':
      inline: true
      name: Biztonásgi Mentés Dátuma
      value: '%date%'
    '4':
      inline: true
      name: Kategória
      value: '%category%'
    '5':
      inline: true
      name: Extra Infórmáció
      value: '%extrainfo%'
    '6':
      inline: true
      name: Biztonsági Mentés Helyszíne
      value: '%location%'

# ------- DISCORD ADDON -------

# set enable-discord-addon in the config.yml to true if you want to enable this module

# you must create a bot at https://discord.com/developers/applications
# the bot will run on your minecraft server, you don't need to do anything externally
token: ''

bot-activity: Leltárak Visszaállítása

# where should the requests be sent?
channel-id: ''

# the permission needed to interact with a restore request on discord
# list of permissions: https://ci.dv8tion.net/job/JDA5/javadoc/net/dv8tion/jda/api/Permission.html
required-permission: ADMINISTRATOR

create-thread: true
thread-name: Visszaállítás

messages:
  restore: Visszaállítás
  decline: Elutasítás
  restored: '&#FFCC00A tárgyaid vissza lettek állítva Shulkerként, nézd meg a leltáradat!'
  accepted: A visszaállítási kérelem sikeresen elfogadva!
  declined: A visszaállítási kérelem sikeresen eltuasítva!
  # the new color of the embed
  accepted-color: '#00ff00'
  declined-color: '#ff0000'
  no-permission: Nincsen jogosultságod ehhez!

request-restore:
  material: BLUE_DYE
  name: '&#00CCFFKérelem Küldése Discord Bottal'
  lore:
  - ' '
  - ' &7- &#00FFFFHasználja ezt, ha magasabb rangú staff szeretne helyreállítást kérni!'
  - ' '
  - '&#00CCFF&l(!) &#00CCFFKattints ide hogy elküld!'

prompt:
  color: '#00aaff'
  title:
    text: '%player% - Visszaállíttási Kérelem'
  fields:
    '1':
      inline: true
      name: Kérte
      value: '%requester%'
    '2':
      inline: true
      name: Létrehozási Dátum
      value: '%date%'
    '3':
      inline: false
      name: Helyszín
      value: '%location%'
    '4':
      inline: true
      name: Létrehozva
      value: '%category%'
    '5':
      inline: true
      name: Okozta
      value: '%cause%'

version: 3
