  - ' '
  - '&#FF6600ʙᴀʟ ᴋᴀᴛᴛɪɴᴛáꜱ'
  - ' &7- &f1. pozíció kijelölése'
  - ' '
  - '&#FF6600ᴊᴏʙʙ ᴋᴀᴛᴛɪɴᴛáꜱ'
  - ' &7- &f2. pozíció kijelölése'
  - ' '

