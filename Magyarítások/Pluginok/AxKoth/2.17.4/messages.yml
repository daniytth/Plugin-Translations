time:
  second: mp
  minute: p
  hour: ó
  day: n

# this section will be ignored if you don't have a team plugin enabled
teams:
  team-format: '&8[&#FF6600%team%&8]&r'
  # the next 2 settings will be used for the %player% placeholder in some messages
  team-player: '%player% %team%'
  # player without a team
  player: '%player%'

selection-wand:
  material: GOLDEN_AXE
  name: '&#FF6600&lKIJELÖLŐ ESZKÖZ'
