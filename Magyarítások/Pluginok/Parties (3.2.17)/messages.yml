    to-higher-rank: "&cNem léptethetsz fel egy olyan rangra, amely azonos vagy magasabb mint a tiéd!"
    full: "&cA(z) %rank_name% rang elérte a maximális játékos számot"
    fixed-leader: "&cNem tehetsz valakit egy fix parti vezetőjévé!"
    demote-leader: "&cNem lefokozhatod a parti vezetőjét"
    changing-yourself: "&cNem változtathatod meg a saját rangodat!"
    player-not-in-party: "&c%player% nincs a partidban"
    players-conflict:
      # [Speciális címkék]
      # => %username%                       = A játékos neve
      # => %rank%                           = A rang
      # => %list_players%                   = Minden játékos listája
      # => %number%                         = A játékos száma
      # => %lastloginapi_last_logout_date%  = Az utolsó kijelentkezés dátuma (LastLoginAPI plugin)
      content:
      - "&cTöbb játékost is találtunk ezzel a névvel:"
      - "%list_players%"
      - "&cHasználd ezt: '&7/party rank <felhasználónév> <rang> <szám>&c' hogy megváltoztasd a megfelelő játékos rangját"
      player: '{"text":"","extra":[{"text":"[%number%] ","color":"gray"},{"text":"%username%","color":"gold"},{"text":" [","color":"gray"},{"text":"%party%","color":"aqua"},{"text":"]: utolsó belépés %lastloginapi_last_logout_date%","color":"gray"}],"clickEvent":{"action":"run_command","value":"/party rank %username% %rank% %number%"},"hoverEvent":{"action":"show_text","value":{"text":"Változtasd meg ennek a játékosnak a rangját","color":"gold"}}}'

  rename:
    # [Speciális címkék]
    # => %old%   = Régi parti név
    renamed: "&aA(z) %old% parti átnevezve erre: %party%"
