    name-too-short: "&cA parti név túl rövid!"
    invalid-name: "&cÉrvénytelen karakterek. Használj: a-Z vagy 0-9."
    censored: "&cA parti név tiltott szavakat tartalmaz!"

  delete:
    deleted: "&a%party% parti törölve"
    deleted-silently: "&a%party% parti csendben törölve"
    broadcast: "&6&lA partid törölve lett"

  deny:
    no-request: "&cNincs függőben lévő kérésed"
    no-exists: "&cA kérés már nem létezik"
    multiple-requests: "&cVálaszd ki, melyik kérést szeretnéd elutasítani:"
    multiple-requests-party: '[{"text":"%party%","color":"aqua"},{"text":" - Kattints ide az elutasításhoz","color":"gray","clickEvent":{"action":"run_command","value":"/%run_command% %party%"},"hoverEvent":{"action":"show_text","value":{"text":"","extra":[{"text":"Utasítsd el a kérést","color":"gold"}]}}}]'
    multiple-requests-player: '[{"text":"%player%","color":"aqua"},{"text":" - Kattints ide az elutasításhoz","color":"gray","clickEvent":{"action":"run_command","value":"/%run_command% %player%"},"hoverEvent":{"action":"show_text","value":{"text":"","extra":[{"text":"Utasítsd el a kérést","color":"gold"}]}}}]'

  ignore:
    start-ignore: "&7Mostantól figyelmen kívül hagyod a(z) %party% meghívóit"
    stop-ignore: "&7Már nem hagyod figyelmen kívül a(z) %party% meghívóit"
