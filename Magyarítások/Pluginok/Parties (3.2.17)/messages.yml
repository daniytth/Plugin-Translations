    # [Speciális címkék]
    # => %seconds%   = Hátralévő idő másodpercben
    cooldown: "&cVárnod kell %seconds% másodpercet!"

  spy:
    enabled: "&7Most már kém vagy!"
    disabled: "&7Már nem vagy kém"

  version:
    # [Speciális címkék]
