# / =============================== \
# |        PARTY ÜZENETEK           |
# \ =============================== /
parties:
  # [Speciális címkék]
  # => %version%     = Új verzió található
  # => %thisversion% = Telepített verzió
  update-available: "&9Van új verziója Partiesnak: %version% (Jelenlegi: %thisversion%)"
  
  # [Speciális címkék]
  # => %config%      = Az elavult konfigurációs fájl neve
  configuration-outdated: "&cA konfigurációs fájl '%config%' Partiesnak nem a legfrissebb!"

  common-messages:
    invalid-command: "&cÉrvénytelen parancs"
    configuration-reloaded: "&aKonfiguráció újratöltve"
    not-in-party: "&cNem vagy partiban"
    already-in-party: "&cMár egy partiban vagy!"
    party-not-found: "&cA parti %party% nem létezik. Lehet elírtad"
    party-full: "&cA parti tele van!"
    player-not-found: "&cA játékos %player% nem található"
    player-not-in-party: "&c%player% nincsen partiban"

  options:
    enabled: '&aEngedélyezve'
    disabled: '&cLetiltva'
    toggled-on: '&aBe'
    toggled-off: '&cKi'
    word-yes: '&aIgen'
    word-no: '&cNem'
    empty: '&8Üres'
    none: '&8Semmi'

  syntax:
    wrong-message: '&cRossz szintaxis: Írd be ezt &7/%syntax%'
    color: 'szín'
    description: 'leírás'
    experience: 'tapasztalat'
    kills: 'ölés'
    home: 'otthon'
    members: 'tagok'
    message: 'üzenet'
    motd: 'motd'
    name: 'név'
    nickname: 'becenév'
    online-members: 'online_tagok'
    order: 'rendezés'
    page: 'oldal'
    party: 'parti'
    password: 'jelszó'
    permission: 'jogosultság'
    player: 'játékos'
    rank: 'rang'
    tag: 'címke'

  permissions:
    # [Speciális címkék]
    # => %permission%  = Hiányzó jogosultság
    no-permission: "&cNincsen jogosultságod ehhez a parancshoz"
    no-permission-in-party-general: "&cA partis rangodnak nincsen joga ehhez"
    no-permission-in-party-rank: "&cNeked ebben a rangban kell lenned: %rank_name% hogy végrehajtsd a parancsot"

  out-party: "Partiból kilépés"

  list:
    player-online-format: "&b%player%"
    player-offline-format: "&7%player%"
    player-separator: "&7, "
    player-empty: "&7Senki"
    player-unknown: "&6Valaki"
    missing-value: "&7Melé"

  # A Parties chat üzeneteinek formátumának meghatározása
  formats:
    party-chat: "&b[Party] %player_rank_chat% %player%&r&7: &b%message%"
    spy:
      party-chat: "&7[SPY] [%party%] %player%: %message%"
      broadcast: "&7[SPY] [%party%]: %message%"

# / =============================== \
# |     FŐ PARANCSOK ÜZENETEI      |
# \ =============================== /
main-commands:
  accept:
