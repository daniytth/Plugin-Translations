    multiple-requests-player: '[{"text":"%player%","color":"aqua"},{"text":" - Kattints ide az elfogadáshoz","color":"gray","clickEvent":{"action":"run_command","value":"/%run_command% %player%"},"hoverEvent":{"action":"show_text","value":{"text":"","extra":[{"text":"Fogadd el a kérést","color":"gold"}]}}}]'

