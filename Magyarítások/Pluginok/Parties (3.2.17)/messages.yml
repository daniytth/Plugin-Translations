    - "&b&lLeírás&7: %desc%"
    - "&bVezető&7: %list_rank_leader%"
    - "&bModerátorok&7: %list_rank_moderator%"
    - "&bTagok&7: %list_rank_member%"
    - "&bOnline játékosok&7: %members_online_total%"
    content-other-party:
    - "&b============ &l%party% Információi &r&b============"
    - "&b&lLeírás&7: %desc%"
    - "&bVezető&7: %list_rank_leader%"
    - "&bModerátorok&7: %list_rank_moderator%"
    - "&bTagok&7: %list_rank_member%"
    - "&bOnline játékosok&7: %members_online_total%"

  invite:
