    accept:
      broadcast: "&b&l%player% csatlakozott a partihoz"
      accepted: "&aElfogadtad a parti meghívást"
      receipt: "&a%player% elfogadta a meghívásod"
    deny:
      broadcast: ""
      denied: "&aElutasítottad a parti meghívást"
      receipt: "&a%player% elutasította a meghívásod"
    timeout:
      no-response: "&7%player% nem fogadta el a parti meghívást"
      timeout: "&7Nem fogadtad el a(z) %party% parti meghívást"
    revoke:
      sent-revoked: "&7Visszavont meghívás elküldve %player% részére"
      player-invite-revoked: "&7A(z) %party% partitól kapott meghívást visszavonták"
    cooldown:
      global: "&cVárnod kell %seconds% másodpercet mielőtt újabb játékost meghívhatsz"
      individual: "&cVárnod kell %seconds% másodpercet mielőtt újra meghívhatod ugyanazt a játékost"
      on-leave: "&cVárnod kell %seconds% másodpercet mielőtt meghívhatod ezt a játékost"
    player-offline: "&cCsak online játékosokat hívhatsz meg"
    player-no-permission: "&c%player% nincs jogosultsága a csatlakozáshoz"
    player-in-party: "&c%player% már egy partiban van"
    already-invited: "&c%player% már meg volt hívva"
    invite-yourself: "&cNem hívhatod meg magadat"
    failed: "&cSikertelen volt %player% meghívása"

  kick:
    sent: "&aKirúgtad %player% a partiból!"
    player-kicked: "&bKirúgtak a(z) %party% partiból"
    broadcast: "&b&l%player% ki lett rúgva a partiból"
    broadcast-disband: "&b&lA parti feloszlott, mert a vezetőt kirúgták"
