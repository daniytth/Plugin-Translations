      message: "&#00FF00/trade accept %player%"
      hover: "&#00FF00Kattints ide &nelfogad&#00FF00 a kereskedelmi kérést!"
    deny:
      message: "&#FF0000/trade deny %player%"
      hover: "&#FF0000Kattints ide &nelutasítsd&#00FF00 a kereskedelmi kérést!"
  no-request: "&#CCFFEEKereskedési kérés nem található &#00FFDD%player%&#CCFFEE játékostól!"
  deny-sender: "&#CCFFEEKereskedési kérés elutasítva &#00FFDD%player%&#CCFFEE játékostól!"
  deny-receiver: "&#CCFFEEKereskedési kérés sikeresen elutasítva &#00FFDD%player%&#CCFFEE játékostól!"
  cant-trade-self: "&#CCFFEEKereskedés nem lehet önmagával!"
  already-in-trade: "&#CCFFEEA játékos már kereskedik valakivel!"
  already-sent: "&#CCFFEEKereskedési kérés már küldve &#00FFDD%player%&#CCFFEE játékostól réceménnyel!"
