# DOKUMENTÁCIÓ: https://docs.artillex-studios.com/axtrade.html
# ITEM BUILDER: https://docs.artillex-studios.com/item-builder.html

# ----- BEÁLLÍTÁSOK -----

title: "&0Csere vele: %player%"
# a felületnek 1-6 sora lehet
rows: 6

# ----- SLOTOK -----

# azok a slotok, ahova a tárgyakat lehet helyezni
# ügyelj arra, hogy dekoratív tárgyakat vagy valutákat ne helyezz ezekbe a slotokba
# az own-slots és partner-slots listáknak egyenlő számú slotot kell tartalmazniuk
own-slots:
  - 9-12
  - 18-21
  - 27-30
  - 36-39
  - 45-48

partner-slots:
  - 14-17
  - 23-26
  - 32-35
  - 41-44
  - 50-53

# ----- TÁRGYAK -----

# a te oldaladon lévő tárgyak
own:
  confirm-item:
    slot: 0
    # ezeket a helykitöltőket használhatod:
    # %own-name%
    # %partner-name%
    accept:
      material: "RED_CONCRETE"
      # ha szeretnéd, hozzáadhatsz fej textúrákat, így:
      #material: "PLAYER_HEAD"
      #texture: "%own-head%"
      name: "&#00ffdd&lᴄsᴇʀᴇ ᴍᴇɢᴋᴏɴғɪʀᴍᴀʟᴀsᴀ"
      lore:
        - ""
        - " &7- &fElégedett vagy a cserével?"
        - ""
        - "&#00ffdd&l> &#00ffddKattintás &8- &#00ffddCsere elfogadása"
    cancel:
      material: "LIME_CONCRETE"
      name: "&#00ffdd&lᴍᴇɢᴋᴏɴғɪʀᴍᴀʟᴀs ᴠɪssᴢᴀᴠᴏɴᴀsᴀ"
      lore:
        - ""
        - " &7- &fSzeretnél valamin változtatni?"
        - ""
        - "&#00ffdd&l> &#00ffddKattintás &8- &#00ffddVisszavonás"
  # annyi valutát definiálhatsz, amennyit csak szeretnél, de másold át őket a 'partner' szakaszba is!
  currency1:
    slot: 2
    # ehhez szükséges a Vault plugin telepítve
    currency: "Vault"
    material: "GOLD_NUGGET"
    name: "&#00ffdd&lᴘᴇɴᴢ"
    # ezeket a helykitöltőket használhatod:
    #  %amount% (a játékos által beállított összeg)
    #  %tax-amount% (adó utáni összeg)
    #  %tax-percent% (az adó százalékos értéke)
    #  %tax-fee% (adó miatt levett összeg)
    lore:
      - "&7Te ajánlatod"
      - ""
      - " &7- &fÖsszeg: &#00ffdd%amount%$"
      - ""
      - "&#00ffdd&l> &#00ffddKattintás &8- &#00ffddÖsszeg módosítása"
  currency2:
    slot: 3
    currency: "Experience"
    material: "EXPERIENCE_BOTTLE"
    name: "&#00ffdd&lᴛᴀᴘᴀsᴢᴛᴀʟᴏᴍ"
    lore:
      - "&7Te ajánlatod"
      - ""
      - " &7- &fÖsszeg: &#00ffdd%amount% EXP"
      - ""
      - "&#00ffdd&l> &#00ffddKattintás &8- &#00ffddÖsszeg módosítása"

# a cserepartnered oldalán lévő tárgyak
partner:
  confirm-item:
    slot: 8
    # ezeket a helykitöltőket is használhatod:
    # %own-name%
    # %partner-name%
    accept:
      material: "RED_CONCRETE"
      # ha szeretnéd, hozzáadhatsz fej textúrákat, így:
      #material: "PLAYER_HEAD"
      #texture: "%partner-head%"
      name: "&#00ffdd&lᴠᴀʀᴀᴋᴏᴢᴀs ᴀ ᴍᴀsɪᴋ ᴊᴀ́ᴛᴇ́ᴋᴏsʀᴀ"
      lore:
        - ""
        - " &7- &f%partner-name% még nem erősítette meg a cserét!"
        - ""
    cancel:
      material: "LIME_CONCRETE"
      name: "&#00ffdd&lᴠᴀʀᴀᴋᴏᴢᴀs"
      lore:
        - ""
        - " &7- &f%partner-name% már megerősítette a cserét!"
  currency1:
    slot: 6
    currency: "Vault"
    material: "GOLD_NUGGET"
    name: "&#00ffdd&lᴘᴇɴᴢ"
    # ezeket a helykitöltőket használhatod:
    #  %amount% (a játékos által beállított összeg)
    #  %tax-amount% (adó utáni összeg)
    #  %tax-percent% (az adó százalékos értéke)
    #  %tax-fee% (adó miatt levett összeg)
    lore:
      - "&7%partner-name% ajánlata"
      - ""
      - " &7- &fÖsszeg: &#00ffdd%amount%$"
      - ""
      - "&#00ffdd&l> &#00ffddKattintás &8- &#00ffddÖsszeg módosítása"
  currency2:
    slot: 5
    currency: "Experience"
    material: "EXPERIENCE_BOTTLE"
    name: "&#00ffdd&lᴛᴀᴘᴀsᴢᴛᴀʟᴏᴍ"
    lore:
      - "&7%partner-name% ajánlata"
      - ""
      - " &7- &fÖsszeg: &#00ffdd%amount% EXP"
      - ""
      - "&#00ffdd&l> &#00ffddKattintás &8- &#00ffddÖsszeg módosítása"

decoration-example:
  slot: [4, 13, 22, 31, 40, 49]
  material: "LIGHT_BLUE_STAINED_GLASS_PANE"
  name: " "

