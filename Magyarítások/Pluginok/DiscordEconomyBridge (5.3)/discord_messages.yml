#####################################
# rockpaperscissors command message #
#####################################

rpsCommand:
  messages:
    # Message when a user is challenged
    challenge:
      title: "Elfogadod? %discord_other_user_tag% (%player_other_name%)"
      description: "%discord_user_tag% (%player_name%) kérte a kő, papír, olló játékot!"
      color: "#e0e019"

    # Message if the opponent declines the challenge.
    declined:
      color: 0xff2600
      title: "Kő, papír, olló játék elutasítva"
      description: "%discord_other_user_username% elutasította a játékot."

    # Game message
    game:
      color: "#4287f5"
      title: "Kő, papír, olló játék"
      description: "Várakozás a zárolásra. Kör {round} a {rounds} körön belül"
      fields:
        "%discord_user_username% - {points_1} - {p1_locked_in}":
          text: "\n{rounds_1}\n"
        "%discord_other_user_username% - {points_2} - {p2_locked_in}":
          text: "\n{rounds_2}\n"

    # Game against bot
    gameBot:
      color: "#4287f5"
      title: "Kő, papír, olló játék"
      description: "Várakozás a zárolásra. Kör {round} a {rounds} körön belül"
      fields:
        "Bot - {points_1}":
          text: "\n{rounds_1}\n"
        "%discord_user_username% - {points_2}":
          text: "\n{rounds_2}\n"

    # Message when game is done main(%player_name% is the winner) and other(%player_other_name%) is the loser
    gameOver:
      color: "#34d90b"
      title: "Kő, papír, olló játék. A játék véget ért!"
      description: "%discord_user_username% (%player_name%) megnyerte a játékot %discord_other_user_username% (%player_other_name%) ellen. Jobb szerencséd lesz következő alkalommal %discord_other_user_username%!"
      fields:
        "%{p1}discord_user_username% - {points_1}":
          text: "\n{rounds_1}\n"
        "%{p2}discord_user_username% - {points_2}":
          text: "\n{rounds_2}\n"

    draw:
      color: "#34d90b"
      title: "Kő, papír, olló játék. A játék véget ért! Döntetlen!"
      description: "%discord_user_username% (%player_name%) és %discord_other_user_username% (%player_other_name%) pontjaik megegyeznek."
      fields:
        "%{p1}discord_user_username% - {points_1}":
          text: "\n{rounds_1}\n"
        "%{p2}discord_user_username% - {points_2}":
          text: "\n{rounds_2}\n"

    # Message when game is done against the bot

    gameOverBotPlayerWin:
      color: "#34d90b"
      title: "Kő, papír, olló játék. A játék véget ért!"
      description: "%discord_user_username% (%player_name%) megnyerte a játékot a bot ellen!"
      fields:
        "Bot - {points_1}":
          text: "\n{rounds_1}\n"
        "%discord_user_username% - {points_2}":
          text: "\n{rounds_2}\n"

    gameOverBotPlayerLose:
      color: "#34d90b"
      title: "Kő, papír, olló játék. A játék véget ért!"
      description: "%discord_user_username% (%player_name%) elvesztette a játékot a bot ellen!"
      fields:
        "Bot - {points_1}":
          text: "\n{rounds_1}\n"
        "%discord_user_username% - {points_2}":
          text: "\n{rounds_2}\n"

    drawBot:
      color: "#34d90b"
      title: "Kő, papír, olló játék. A játék véget ért! Döntetlen!"
      description: "%discord_user_username% (%player_name%) és a bot pontjaik megegyeznek."
      fields:
        "Bot - {points_1}":
          text: "\n{rounds_1}\n"
        "%discord_user_username% - {points_2}":
          text: "\n{rounds_2}\n"



  # The text to display with {current_turn_playing} when it's player's turn
  botCurrentPlayingPlayer: "%discord_user_username%"
  # The text between rounds
  joinedTextForStatus: " | "
  # Text to display for round
  roundText: "{picked} {result}"
  # If no rounds were played
  noRoundsPlayed: "Még nem játszottál!"

  # Text for when the user locked in their anwser
  textLockedIn: "Zárolva!"
  textWaitingForLockIn: "Várakozás a játékra..."

  # Text when someone clicks a button after they locked in
  textAfterLockIn: "Már kiválasztottad a válaszodat"

  # Text for round win
  roundWin: ":white_check_mark:"
  roundLose: ":x:"

  # Text to display for paper
  rpcPaper: ":page_with_curl:"
  # Text to display for rock
  rpcRock: ":rock:"
  # Text to display for scissor
  rpcScissor: ":scissors:"

  # Label to display for button
  rpcRockButtonLabel: "🪨"
  rpcPaperButtonLabel: "📃"
  rpcScissorButtonLabel: "✂️"

  # Accept label on button
  buttonAcceptLabel: "Elfogad"
  # Decline label on button
  buttonDeclineLabel: "Elutasít"

