# coinflip command embed #
##########################

# Game outcome
coinflipCommandEmbed:
  content: "** **"
  color: "#4287f5"
  description: "**%discord_user_username%** megnyerte a fej vagy írás dobást. A pénzez `{land_side}`!"
  fields:
    "Tét":
      text: "{amount_wagered}"



# Accept/Confirm
coinflipCommandConfirmEmbed:
  content: "<@%discord_user_id%>"
  color: "#ebd407"
  ping: true
  description: "**%discord_user_username%** meghívott tétet a fej vagy írás dobásra! %discord_other_username%"
  fields:
    "Tét":
      text: "{amount_wagered}"

# Decline
coinflipCommandDeclineEmbed:
  content: "** **"
  color: "#d62400"
  description: "%discord_user_username%. **%discord_other_user_username%** elutasította a fej vagy írás dobást!"
  fields:
    "Tét":
      text: "{amount_wagered}"

coinflipButtonAcceptLabel: "Elfogad"
coinflipButtonDeclineLabel: "Elutasít"

