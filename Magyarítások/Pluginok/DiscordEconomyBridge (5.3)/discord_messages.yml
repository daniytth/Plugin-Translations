###################################
## Discord Message Configuration ##
###################################

# Inbuilt Placeholders
# %player_name% = minecraft player username
# %player_uuid% = minecraft player uuid
# %discord_user_username% = Discord username
# %discord_user_discriminator% = Discriminator of user
# %discord_user_tag% = Tag of user
# %discord_user_avatar_url% = Discord avatar url
# %discord_user_nickname% = Discord user nickname
# %discord_command_name% = Name of the command
# %discord_command_prefix% = Prefix of the command
# %discord_command_usage% = Usage of the command
# %discord_user_id% = Id of user

# Per command special placeholders are stored as {placeholder}

# Button click by someone who's not allowed to click it
onWrongClickMessage:
  content: "Ezt a menüt nem tudod használni!"

# Discord no permission message
noPermissionMessage:
  description: "Nincs engedélyed a parancs futtatására!"
  color: 0xb72d0e

# Supported placeholders:
# {message}

failMessage:
  description: ":x: {message}"
  fields:
    Usage:
      text: "%discord_command_prefix%%discord_command_name% %discord_command_usage%"
  color: 0xb72d0e

# Error message

errorMessage:
  color: "#e31e00"
  description: "Egy hiba történt :("

##########################
# addmoney command embed #
##########################
# The amount of money increased {amount_increase}

addmoneyCommandEmbed:
  description: "{amount_increase} pénzt adtál %player_name% fiókjára"
  color: 0xe0c308

#############################
# removemoney command embed #
#############################

removemoneyCommandEmbed:
  description: "{amount_decrease} pénzt elvittél %player_name%'s fiókjából"
  color: 0xe0c308

#########################
# balance command embed #
# %custom_vault_eco_balance% custom one for balance but you can use the placeholder one
#########################

balanceCommandEmbed:
  color: "ifOnline ? 0x26b207 : 0xb72d0e"
  fields:
    "Felhasználónév":
      text: "%player_name%"
      inline: true
    "Állapot":
      # Use playerStatus for lowercase outcome
      text: "%custom_player_online%"
      inline: true
    "Pénztár":
      text: "%custom_vault_eco_balance%"
      inline: true

######################
# help command embed #
######################

helpCommandEmbed:
  title: "Ezek a Parancsok Elérhetők"
  color: "#0048ad"
  fields:
    "%discord_command_prefix%balance":
      text:
        - "Egy játékos jelenlegi pénztárát nézi"
        - "Használat: %discord_command_prefix%balance <username or uuid"
        - "Álnév: %discord_command_prefix%bal"
      inline: false
    "%discord_command_prefix%addmoney":
      text:
        - "Pénzt adunk egy játékosnak"
        - "Használat: %discord_command_prefix%addmoney <amount> <username or uuid>"
      inline: false
    "%discord_command_prefix%removemoney":
      text:
        - "Pénzt elvesszük egy játékosnak"
        - "Használat: %discord_command_prefix%removemoney <amount> <username or uuid>\nAlias: %discord_command_prefix%remmoney"
      inline: false
    "%discord_command_prefix%leaderboard":
      text:
        - "A jelenlegi vezetőlista megjelenítése"
        - "Használat: %discord_command_prefix%leaderboard"
        - "Álnév: %discord_command_prefix%top, %discord_command_prefix%lb"
      inline: false
    "%discord_command_prefix%blackjack":
      text:
        - "Blackjack játék egy adott összegű téttel!"
        - "Használat: %discord_command_prefix%blackjack <bet>"
        - "Álnév: %discord_command_prefix%bj"
      inline: false
    "%discord_command_prefix%coinflip":
      text:
        - "Fej vagy írás dobás és tét a másik játékos ellen!"
        - "Használat: %discord_command_prefix%coinflip"
        - "Álnév: %discord_command_prefix%cf"
      inline: false
    "%discord_command_prefix%pay":
      text:
        - "Egy adott összegű pénzt küldünk egy játékosnak!"
        - "Használat: %discord_command_prefix%pay @user amount"
        - "Álnév: %discord_command_prefix%cf"
      inline: false
    "%discord_command_prefix%rockpaperscissors":
      text:
        - "Kő, papír, olló játék!"
        - "Használat: %discord_command_prefix%rockpaperscissors [user] <bet> [rounds](max 32)"
        - "Álnév: %discord_command_prefix%cf"
      inline: false

