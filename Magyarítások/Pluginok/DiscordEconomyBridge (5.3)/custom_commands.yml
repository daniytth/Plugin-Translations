## +-------------+ ##
#  Custom commands  #
## +-------------+ ##

commands:
  info:
    description: "Egy játékos információi!"
    inputs:
      player:
        type: MinecraftPlayer
        name: "player"
        description: "A játékos aki információit meg szeretnénk nézni"
        required: false

    actions:
      player:
        type: GetCommandExecutorPlayer
        onlyIfNull: player
      discordMember:
        type: GetDiscordMemberFromMinecraftPlayer
        from: player
      joinDate:
        type: DefineText
        value: "Ez a játékos nincs linkelve!"
        valueElse: "{var_discordMember:timeCreated}"
        onlyIfNull: discordMember

    enablePlaceholdersFor: player
    message:
      color: 0x3242a8
      fields:
        "Felhasználónév":
          text: "%player_name%"
          inline: true
        "Állapot":
          text: "%player_online%"
          inline: true
        "Csatlakozás Dátuma":
          text: "{var_joinDate}"
          inline: true

  work:
    description: "Munkára pénzt kapunk"
    format:
      - "randomNumber"
    actions:
      player:
        type: GetCommandExecutorPlayer
      erlMsg:
        type: FailMessage
        onlyIfNull: player
        message: "A fiókod nincs linkelve!"
      randomNumber:
        type: RandomNumber
        max: 200
        min: 10
      randomText:
        type: RandomText
        options:
          - "8 órás munkára {var_randomNumber} pénzt kaptál"
          - "Jól csináltál! {var_randomNumber} pénzt kaptál"
      addmoney:
        type: IncreasePlayerMoney
        amount: randomNumber
        player: player
    message:
      color: "#11a638"
      description: "{var_randomText}"

