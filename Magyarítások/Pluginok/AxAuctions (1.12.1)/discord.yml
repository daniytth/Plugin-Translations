# REQUIRED
url: ""

auction-start:
  enabled: true
  color: "#00DDFF"
  title:
    text: "Új Aukció"
  fields:
    "1":
      inline: false
      name: Eladó
      value: "%player%"
    "2":
      inline: false
      name: Tárgy
      value: "%amount%x %item%"
    "3":
      inline: false
      name: Ár
      value: "%price%"

auction-buy:
  enabled: true
  color: "#00DDFF"
  title:
    text: "Tárgy Megvásárolva"
  fields:
    "1":
      inline: true
      name: Vásárló
      value: "%player%"
    "2":
      inline: true
      name: Eladó
      value: "%seller%"
    "3":
      inline: false
      name: Tárgy
      value: "%amount%x %item%"
    "4":
      inline: true
      name: Ár
      value: "%price%"

# do not change this
version: 1