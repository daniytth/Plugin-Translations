# Saját valutákat hozhatsz létre helyettesítő szimbólumok (placeholder) használatával
# Ügyelj arra, hogy egyik helyettesítő szimbólumon se legyen formázás
# PlaceholderAPI szükséges
placeholder-currencies:
  Example-Currency:
    register: false
    # Ha a valuta egész számokat használ, kapcsold ki ezt
    # 100.5 - true
    # 100 - false
    uses-double: true
    # Ha a helyettesítő szimbólum offline játékosoknál is kiértékelhető, kapcsold be
    works-offline: false
    tax: 0
    settings:
      raw-placeholder: "%vault_eco_balance_fixed%"
      give-command: "eco give %player% %amount%"
      take-command: "eco take %player% %amount%"
    display:
      raw: "Pénz"
      gui: "&f%price% &#AAFFFFpénz"
      item:
        material: EMERALD
        name: "&#00DDFFPénz"
        lore:
          - " "
          - "&#00DDFF&l(!) &#00DDFFKattints ide a kiválasztáshoz!"

